<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free YouTube Downloader</title>
    <!-- ⚠️ AdSense: अपना ID लगाएं -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-0000000000000000" crossorigin></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh;}
        .container{max-width:1000px;margin:0 auto;padding:15px;}
        .header{text-align:center;padding:30px 15px;}
        .logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;}
        .logo h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#ff0000,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .subtitle{color:#8888aa;}
        
        .input-section{background:#12122a;border-radius:16px;padding:25px;border:1px solid rgba(255,255,255,0.08);margin-bottom:20px;}
        .input-group{display:flex;gap:10px;background:#0d0d24;border-radius:12px;padding:5px;border:2px solid transparent;}
        .input-group:focus-within{border-color:#ff0000;}
        #urlInput{flex:1;padding:14px 10px;background:transparent;border:none;color:#fff;font-size:15px;outline:none;}
        #urlInput::placeholder{color:#555;}
        #fetchBtn{padding:12px 28px;background:linear-gradient(135deg,#ff0000,#cc0000);color:white;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;white-space:nowrap;}
        #fetchBtn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,0,0,0.4);}
        #fetchBtn:disabled{opacity:0.6;cursor:not-allowed;}
        .supported-links{margin-top:12px;font-size:12px;color:#555;display:flex;gap:8px;flex-wrap:wrap;}
        .supported-links span{background:rgba(255,255,255,0.06);padding:3px 10px;border-radius:5px;font-family:monospace;color:#888;}
        
        .loading-section{text-align:center;padding:40px;display:none;}
        .spinner{width:45px;height:45px;border:4px solid rgba(255,255,255,0.05);border-top:4px solid #ff0000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 15px;}
        @keyframes spin{100%{transform:rotate(360deg);}}
        
        .video-card{background:#12122a;border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,0.08);margin-bottom:20px;display:none;}
        .video-card-inner{display:flex;gap:20px;align-items:flex-start;}
        #thumbnail{width:280px;border-radius:12px;flex-shrink:0;max-width:100%;}
        .video-details h2{font-size:20px;font-weight:700;margin-bottom:12px;}
        .video-meta{display:flex;gap:18px;color:#8888aa;font-size:13px;flex-wrap:wrap;}
        .video-actions{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap;}
        .btn-quick{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:white;}
        .btn-video{background:#2196F3;}
        .btn-audio{background:#4CAF50;}
        .btn-full{background:#FF9800;}
        .btn-mp3{background:#9C27B0;}
        
        .format-section{display:none;}
        .tabs{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap;}
        .tab{padding:10px 20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#8888aa;cursor:pointer;font-size:13px;font-weight:600;}
        .tab.active{background:#ff0000;border-color:#ff0000;color:white;}
        
        .filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
        .filter-group{flex:1;min-width:150px;}
        .filter-group label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:600;}
        .filter-group select{width:100%;padding:8px 12px;background:#0d0d24;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:13px;outline:none;}
        
        .formats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
        .format-card{background:#1a1a3e;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;transition:all .3s;}
        .format-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.15);}
        .format-type-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:800;margin-bottom:8px;}
        .type-video{background:#2196F3;color:white;}
        .type-audio{background:#4CAF50;color:white;}
        .type-full{background:#FF9800;color:white;}
        .format-quality{font-size:24px;font-weight:800;margin-bottom:5px;}
        .format-details{color:#8888aa;font-size:13px;margin-bottom:8px;}
        .btn-download{width:100%;padding:10px;background:linear-gradient(135deg,#ff0000,#cc0000);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;margin-top:12px;}
        .btn-download:hover{transform:scale(1.02);}
        
        .ad-container{background:rgba(255,255,255,0.02);border-radius:12px;padding:15px;text-align:center;margin:15px 0;min-height:90px;border:1px solid rgba(255,255,255,0.08);}
        
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(5px);}
        .modal-box{background:#12122a;border-radius:20px;padding:35px;width:90%;max-width:400px;text-align:center;border:1px solid rgba(255,255,255,0.08);}
        .progress-track{height:8px;background:rgba(255,255,255,0.08);border-radius:4px;margin:15px 0;overflow:hidden;}
        .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff0000,#ff6b6b);border-radius:4px;transition:width .5s ease;}
        .modal-status{color:#8888aa;font-size:14px;margin-top:10px;}
        
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a3e;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;display:none;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.4);max-width:90%;border:1px solid rgba(255,255,255,0.08);}
        
        .footer{text-align:center;padding:40px 20px;color:#444;font-size:13px;border-top:1px solid rgba(255,255,255,0.08);margin-top:30px;}
        
        @media(max-width:768px){
            .video-card-inner{flex-direction:column;}
            #thumbnail{width:100%;max-height:200px;}
            .logo h1{font-size:24px;}
            .input-group{flex-direction:column;}
            #fetchBtn{width:100%;}
            .formats-grid{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div class="logo">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="#ff0000"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zM9 16V8l8 4-8 4z"/></svg>
            <h1>YT Downloader</h1>
        </div>
        <p class="subtitle">Free YouTube Downloader - All Qualities & Formats</p>
    </header>
    
    <!-- Ad Top -->
    <div class="ad-container">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-0000000000000000" data-ad-slot="0000000000" data-ad-format="auto"></ins>
        <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
    </div>
    
    <!-- Input -->
    <div class="input-section">
        <div class="input-group">
            <input type="url" id="urlInput" placeholder="Paste YouTube link..." autofocus>
            <button id="fetchBtn" onclick="fetchVideo()">🔍 Fetch</button>
        </div>
        <div class="supported-links">
            <span>youtube.com/watch</span>
            <span>youtu.be</span>
            <span>youtube.com/shorts</span>
        </div>
    </div>
    
    <!-- Loading -->
    <div id="loading" class="loading-section"><div class="spinner"></div><p>Fetching...</p></div>
    
    <!-- Video Info -->
    <div id="videoCard" class="video-card">
        <div class="video-card-inner">
            <img id="thumbnail" src="">
            <div class="video-details">
                <h2 id="title">Loading...</h2>
                <div class="video-meta">
                    <span id="channel"><i class="fas fa-user"></i> Channel</span>
                    <span id="duration"><i class="fas fa-clock"></i> 0:00</span>
                    <span id="views"><i class="fas fa-eye"></i> 0 views</span>
                </div>
                <div class="video-actions">
                    <button class="btn-quick btn-video" onclick="quickDl('video')">🎬 Best Video</button>
                    <button class="btn-quick btn-audio" onclick="quickDl('audio')">🎵 Best Audio</button>
                    <button class="btn-quick btn-full" onclick="quickDl('full')">📀 Full</button>
                    <button class="btn-quick btn-mp3" onclick="quickDl('mp3')">🎧 MP3</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Formats -->
    <div id="formatSection" class="format-section">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('all')">📋 All</button>
            <button class="tab" onclick="switchTab('video')">🎬 Video</button>
            <button class="tab" onclick="switchTab('audio')">🎵 Audio</button>
            <button class="tab" onclick="switchTab('full')">📀 Full</button>
        </div>
        <div class="filters">
            <div class="filter-group">
                <label>Quality</label>
                <select id="qFilter" onchange="filterFormats()">
                    <option value="all">All</option>
                    <option value="2160">4K</option>
                    <option value="1080">1080p</option>
                    <option value="720">720p</option>
                    <option value="480">480p</option>
                    <option value="360">360p</option>
                    <option value="audio">Audio</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Format</label>
                <select id="fFilter" onchange="filterFormats()">
                    <option value="all">All</option>
                    <option value="mp4">MP4</option>
                    <option value="webm">WebM</option>
                    <option value="m4a">M4A</option>
                </select>
            </div>
        </div>
        <div id="formatsGrid" class="formats-grid"></div>
    </div>
    
    <!-- Ad Bottom -->
    <div class="ad-container" style="margin-top:20px;">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-0000000000000000" data-ad-slot="0000000000" data-ad-format="auto"></ins>
        <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
    </div>
    
    <footer class="footer">
        <p>🔒 Free & Secure | No Registration</p>
        <p style="font-size:11px;margin-top:5px;color:#333;">For educational purposes only.</p>
    </footer>
</div>

<!-- Modal -->
<div id="progressModal" class="modal-overlay">
    <div class="modal-box">
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
        <div class="modal-status" id="progressStatus">Starting...</div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ===== ⚠️ यहाँ अपना Render.com URL डालें =====
    const API = 'https://yt-downloader-api.onrender.com';
    
    let formats = [], currentUrl = '', currentTab = 'all', downloading = false;
    
    async function fetchVideo() {
        const url = document.getElementById('urlInput').value.trim();
        if(!url) return showToast('❌ URL डालें');
        if(!url.includes('youtube.com') && !url.includes('youtu.be')) return showToast('❌ Valid YouTube URL डालें');
        
        currentUrl = url;
        document.getElementById('fetchBtn').disabled = true;
        document.getElementById('fetchBtn').textContent = '⏳';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('formatSection').style.display = 'none';
        document.getElementById('videoCard').style.display = 'none';
        
        try {
            const r = await fetch(`${API}/info?url=${encodeURIComponent(url)}`);
            const d = await r.json();
            if(d.error) throw new Error(d.error);
            
            document.getElementById('title').textContent = d.title;
            document.getElementById('channel').innerHTML = '<i class="fas fa-user"></i> ' + d.channel;
            document.getElementById('duration').innerHTML = '<i class="fas fa-clock"></i> ' + fmtDur(d.duration||0);
            document.getElementById('views').innerHTML = '<i class="fas fa-eye"></i> ' + fmtNum(d.views||0) + ' views';
            document.getElementById('thumbnail').src = d.thumbnail || `https://img.youtube.com/vi/${getId(url)}/maxresdefault.jpg`;
            document.getElementById('videoCard').style.display = 'block';
            
            formats = d.formats || [];
            filterFormats();
            document.getElementById('formatSection').style.display = 'block';
        } catch(e) { showToast('❌ ' + e.message); }
        
        document.getElementById('fetchBtn').disabled = false;
        document.getElementById('fetchBtn').textContent = '🔍 Fetch';
        document.getElementById('loading').style.display = 'none';
    }
    
    function filterFormats() {
        let f = [...formats];
        switch(currentTab) {
            case 'video': f = f.filter(x => x.type === 'video'); break;
            case 'audio': f = f.filter(x => x.type === 'audio'); break;
            case 'full': f = f.filter(x => x.type === 'full'); break;
        }
        const q = document.getElementById('qFilter').value;
        if(q !== 'all') f = q === 'audio' ? f.filter(x => x.type === 'audio') : f.filter(x => x.height == parseInt(q));
        const fmt = document.getElementById('fFilter').value;
        if(fmt !== 'all') f = f.filter(x => x.ext === fmt);
        renderFormats(f);
    }
    
    function renderFormats(f) {
        const g = document.getElementById('formatsGrid');
        if(!f.length) { g.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">No formats</div>'; return; }
        let h = '';
        f.forEach(x => {
            let tl = 'Full', tc = 'type-full';
            if(x.type === 'video') { tl = 'Video'; tc = 'type-video'; }
            else if(x.type === 'audio') { tl = 'Audio'; tc = 'type-audio'; }
            const q = x.quality || 'N/A', sz = x.filesize ? fmtSize(x.filesize) : '?';
            h += `<div class="format-card">
                <span class="format-type-badge ${tc}">${tl}</span>
                <div class="format-quality">${q}</div>
                <div class="format-details">📁 ${x.ext} | 💾 ${sz}</div>
                <button class="btn-download" onclick="download('${x.format_id}')">⬇ Download</button>
            </div>`;
        });
        g.innerHTML = h;
    }
    
    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab')[['all','video','audio','full'].indexOf(t)].classList.add('active');
        filterFormats();
    }
    
    async function download(fid) {
        if(downloading) return showToast('⏳ Wait...');
        if(!currentUrl) return showToast('❌ Fetch video first');
        downloading = true;
        showProgress(true, 'Starting...');
        updateProgress(20);
        
        try {
            const fd = new URLSearchParams();
            fd.append('url', currentUrl);
            fd.append('format_id', fid);
            
            updateProgress(40);
            showProgress(true, 'Downloading...');
            
            const r = await fetch(`${API}/download`, {
                method: 'POST',
                headers: {'Content-Type':'application/x-www-form-urlencoded'},
                body: fd.toString()
            });
            
            updateProgress(70);
            showProgress(true, 'Processing...');
            
            if(!r.ok) throw new Error('Download failed');
            if(r.headers.get('Content-Type')?.includes('json')) {
                const e = await r.json();
                throw new Error(e.error||'Failed');
            }
            
            updateProgress(90);
            showProgress(true, 'Saving...');
            
            const blob = await r.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'youtube-video.mp4';
            document.body.appendChild(a);
            a.click();
            
            updateProgress(100);
            showProgress(true, '✅ Complete!');
            setTimeout(() => { document.body.removeChild(a); showProgress(false); showToast('✅ Done!'); }, 2000);
        } catch(e) {
            showProgress(true, '❌ ' + e.message);
            setTimeout(() => showProgress(false), 3000);
        }
        downloading = false;
    }
    
    function quickDl(type) {
        let t;
        switch(type) {
            case 'video': t = formats.filter(x=>x.type==='video').sort((a,b)=>(b.height||0)-(a.height||0))[0]; break;
            case 'audio': t = formats.filter(x=>x.type==='audio').sort((a,b)=>(b.abr||0)-(a.abr||0))[0]; break;
            case 'full': t = formats.filter(x=>x.type==='full').sort((a,b)=>(b.height||0)-(a.height||0))[0]; break;
            case 'mp3': t = formats.filter(x=>x.type==='audio').sort((a,b)=>(b.abr||0)-(a.abr||0))[0]; break;
        }
        if(t) download(t.format_id);
        else showToast('❌ Format not available');
    }
    
    function showProgress(s, t) {
        document.getElementById('progressModal').style.display = s ? 'flex' : 'none';
        if(t) document.getElementById('progressStatus').textContent = t;
    }
    function updateProgress(p) { document.getElementById('progressFill').style.width = p + '%'; }
    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 4000);
    }
    function fmtDur(s) {
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
        return h ? `${h}:${p(m)}:${p(sec)}` : `${m}:${p(sec)}`;
    }
    function p(n) { return n.toString().padStart(2,'0'); }
    function fmtNum(n) {
        if(n>=1000000) return (n/1000000).toFixed(1)+'M';
        if(n>=1000) return (n/1000).toFixed(1)+'K';
        return n;
    }
    function fmtSize(b) {
        if(!b) return 'Unknown';
        if(b>=1073741824) return (b/1073741824).toFixed(2)+' GB';
        if(b>=1048576) return (b/1048576).toFixed(2)+' MB';
        if(b>=1024) return (b/1024).toFixed(1)+' KB';
        return b+' B';
    }
    function getId(url) {
        const m = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
        return m ? m[1] : '';
    }
    document.getElementById('urlInput').addEventListener('keypress', function(e) {
        if(e.key === 'Enter') fetchVideo();
    });
</script>
</body>
</html>
